<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odyssey Theme Park Map</title>
  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1376px;
      margin: 0 auto;
      padding: 12px;
    }

    .map-box {
      position: relative;
      width: 100%;
      max-width: 1376px;
      background: #222;
      overflow: hidden;
    }

    .map-box img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    
    .point {
  position: absolute;
  width: 40px;
  height: 40px;
  background: rgba(255,0,0,0.4);
  border-radius: 50%;
  cursor: pointer;

  transform: translate(-50%, -50%);
}

    .point:hover {
      transform: translate(-50%, -50%) scale(1.12);
      background: rgba(255, 180, 0, 0.35);
    }

 
    .point.hidden-look {
      opacity: 1;
    }

    .hint {
      color: #ddd;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="map-box">
     
      <img src="odessey.map.png" alt="Odyssey Theme Park Map" />

      
      <div class="point hidden-look" style="left: 14.9%; top: 20.2%;" onclick="goDetail('troy')" title="트로이"></div>

<div class="point hidden-look" style="left: 8.8%; top: 60.0%;" onclick="goDetail('cicones')" title="키코네스"></div>

<div class="point hidden-look" style="left: 11.8%; top: 75.6%;" onclick="goDetail('lotophagi')" title="로토파고이"></div>

<div class="point hidden-look" style="left: 27.5%; top: 70.0%;" onclick="goDetail('cyclops')" title="키클롭스"></div>

<div class="point hidden-look" style="left: 27.0%; top: 46.5%;" onclick="goDetail('poseidon')" title="포세이돈의 분노"></div>

<div class="point hidden-look" style="left: 35.5%; top: 46.4%;" onclick="goDetail('aeolus')" title="아이올로스"></div>

<div class="point hidden-look" style="left: 36.7%; top: 26.5%;" onclick="goDetail('laestrygonians')" title="라이스트뤄고네스"></div>

<div class="point hidden-look" style="left: 48.8%; top: 50.9%;" onclick="goDetail('circe')" title="키르케의 섬"></div>

<div class="point hidden-look" style="left: 42.6%; top: 72.7%;" onclick="goDetail('underworld')" title="저승 방문"></div>

<div class="point hidden-look" style="left: 58.8%; top: 33.7%;" onclick="goDetail('sirens')" title="세이렌"></div>

<div class="point hidden-look" style="left: 61.5%; top: 54.0%;" onclick="goDetail('scylla_charybdis')" title="스킬라와 카리브디스"></div>

<div class="point hidden-look" style="left: 73.0%; top: 45.0%;" onclick="goDetail('helios_cattle')" title="태양신 헬리오스의 소"></div>

<div class="point hidden-look" style="left: 73.7%; top: 74.0%;" onclick="goDetail('shipwreck')" title="오디세우스의 표류"></div>

<div class="point hidden-look" style="left: 72.0%; top: 22.5%;" onclick="goDetail('calypso')" title="칼립소"></div>

<div class="point hidden-look" style="left: 88.5%; top: 54.5%;" onclick="goDetail('drift')" title="표류"></div>

<div class="point hidden-look" style="left: 85.5%; top: 64.5%;" onclick="goDetail('phaeacia')" title="파이아케스"></div>

<div class="point hidden-look" style="left: 90.5%; top: 30.5%;" onclick="goDetail('ithaca')" title="이타카"></div>
    </div>

    
  </div>

  <script>
    function goDetail(id) {
      window.location.href = "detail.html?id=" + encodeURIComponent(id);
    }
  </script>
</body>
</html>
