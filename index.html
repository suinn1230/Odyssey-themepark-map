<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Odyssey Theme Park Map</title>

<style>
body {
  margin: 0;
  background: black;
}

.map-container {
  position: relative;
  width: 100%;
}

.map-container img {
  width: 100%;
}

/* 클릭 영역 */
.point {
  position: absolute;
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0);
  border: 2px solid red;
  cursor: pointer;
}

/* 호버하면 보이게 */
.point:hover {
  border: 2px solid gold;
}
</style>
</head>

<body>

<div class="map-container">

  <!-- 지도 이미지 -->
  <img src="map.png">

  <!-- 키클롭스 위치 -->
<div class="point" style="top: 40%; left: 25%;" onclick="goDetail('cyclops')"></div>

  <!-- 포세이돈 위치 -->
<div class="point" style="top: 55%; left: 80%;" onclick="goDetail('poseidon')"></div>

</div>

<script>
function goDetail(name){
  window.location.href = "detail.html?name=" + name;
}
</script>

</body>
</html>
