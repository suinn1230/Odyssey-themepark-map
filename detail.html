    }

  margin-bottom: 20px;

}

.image-section h3 {

}

}
    
    .grid {

      gap: 16px;

    .card {

      border-radius: 14px;
      padding: 18px;
    }

    .card h3 {

      color: #ffd166;

    @media (max-width: 768px) {

      }
